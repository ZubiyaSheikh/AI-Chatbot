{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet" href="{% static 'accounts/css/auth.css' %}">

</head>

<body>

    <div class="container">

        <h1>🤖 AI Chatbot</h1>

        <h2>Create Account</h2>

        <form method="post">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
            >

            <input
                type="email"
                name="email"
                placeholder="Email"
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
            >

            <input
                type="password"
                name="confirm_password"
                placeholder="Confirm Password"
            >

            <button type="submit">
                Register
            </button>

        </form>

        <p>
            Already have an account?
            <a href="/login/">Login</a>
        </p>

    </div>

</body>

</html>
